name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Lint and test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-dev.txt

      - name: Static checks
        run: |
          python -m py_compile ai_workstation_launcher.py
          ruff check .

      - name: Unit tests
        run: pytest

      - name: CLI help smoke test
        run: python ai_workstation_launcher.py --help

  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build executable
        shell: pwsh
        run: .\scripts\build_exe.ps1

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIWorkstationHub-windows
          path: dist/AIWorkstationHub

  release:
    name: Publish GitHub release
    runs-on: windows-latest
    needs: build-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AIWorkstationHub-windows
          path: release/AIWorkstationHub

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path .\release\AIWorkstationHub\* -DestinationPath .\release\AIWorkstationHub-windows.zip -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/AIWorkstationHub-windows.zip
          generate_release_notes: true
